<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開發專屬工具箱</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4facfe;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid #333;
        }
        .card h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.4em;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        input[type="text"], input[type="number"], textarea {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #4facfe;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #444;
            color: #fff;
        }
        .result-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #555;
            font-family: monospace;
            font-size: 1.1em;
            color: #a8ff78;
            word-break: break-all;
            min-height: 24px;
        }
        /* 左右分割版面 */
        .split-pane {
            display: flex;
            gap: 20px;
        }
        .split-pane > div {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        @media (max-width: 600px) {
            .split-pane { flex-direction: column; }
        }
    </style>
</head>
<body>

    <h1>🛠️ 開發專屬工具箱</h1>

    <div class="container">
        
        <div class="card">
            <h2>🕒 時間戳轉換 (Timestamp)</h2>
            <div class="input-group">
                <input type="number" id="tsInput" placeholder="請輸入 10 碼或 13 碼時間戳...">
                <button onclick="convertTimestamp()">轉換時間</button>
                <button class="btn-secondary" onclick="getCurrentTimestamp()">目前時間戳</button>
            </div>
            <div class="result-box" id="tsOutput">轉換結果將顯示於此...</div>
        </div>

        <div class="card">
            <h2>🔤 簡繁體文本轉換 (OpenCC)</h2>
            <div class="split-pane">
                <div>
                    <textarea id="textInput" placeholder="請在此貼上需要轉換的文字..."></textarea>
                    <div class="input-group" style="justify-content: center;">
                        <button onclick="convertText('cn2tw')">簡體 ➔ 繁體</button>
                        <button class="btn-secondary" onclick="convertText('tw2cn')">繁體 ➔ 簡體</button>
                        <button class="btn-secondary" onclick="copyResult()" style="background: #28a745;">📋 複製結果</button>
                    </div>
                </div>
                <div>
                    <textarea id="textOutput" placeholder="轉換後的文字會出現在這裡..." readonly></textarea>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 時間戳轉換邏輯
        // ==========================================
        function convertTimestamp() {
            let tsValue = document.getElementById('tsInput').value.trim();
            let output = document.getElementById('tsOutput');
            
            if (!tsValue) {
                output.innerText = "請輸入時間戳！";
                output.style.color = "#ff4444";
                return;
            }

            let ts = parseInt(tsValue);
            // 自動判斷秒 (10碼) 或 毫秒 (13碼)
            if (tsValue.length <= 10) {
                ts = ts * 1000;
            }

            let date = new Date(ts);
            if (isNaN(date.getTime())) {
                output.innerText = "❌ 格式錯誤的無效時間戳";
                output.style.color = "#ff4444";
            } else {
                // 格式化輸出 YYYY-MM-DD HH:mm:ss
                let formatted = date.toLocaleString('zh-TW', { hour12: false });
                output.innerText = `✅ ${formatted}`;
                output.style.color = "#a8ff78";
            }
        }

        function getCurrentTimestamp() {
            let now = Math.floor(Date.now() / 1000); // 取得 10 碼秒數
            document.getElementById('tsInput').value = now;
            convertTimestamp();
        }

        // ==========================================
        // 2. 簡繁轉換邏輯 (使用 opencc-js)
        // ==========================================
        // 初始化轉換器
        const converterS2T = OpenCC.Converter({ from: 'cn', to: 'tw' });
        const converterT2S = OpenCC.Converter({ from: 'tw', to: 'cn' });

        function convertText(mode) {
            let input = document.getElementById('textInput').value;
            let outputField = document.getElementById('textOutput');
            
            if (!input.trim()) {
                outputField.value = "請先輸入要轉換的文字！";
                return;
            }

            if (mode === 'cn2tw') {
                outputField.value = converterS2T(input);
            } else {
                outputField.value = converterT2S(input);
            }
        }

        function copyResult() {
            let outputField = document.getElementById('textOutput');
            if (!outputField.value || outputField.value === "請先輸入要轉換的文字！") return;
            
            outputField.select();
            document.execCommand('copy');
            
            // 提示複製成功
            let originalText = outputField.value;
            outputField.value = "✅ 已複製到剪貼簿！";
            setTimeout(() => {
                outputField.value = originalText;
            }, 1000);
        }
    </script>
</body>
</html>
