<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天使文本處理器 - 繁簡轉換與紅字取代</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #f6d365; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); letter-spacing: 1px; }
        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }
        
        .settings-panel {
            background-color: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 15px;
        }
        .settings-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 1.1em; cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        
        textarea { 
            width: 100%; min-height: 200px; resize: vertical; box-sizing: border-box; line-height: 1.6;
            padding: 15px; border-radius: 6px; border: 1px solid #555;
            background-color: #2a2a2a; color: #fff; font-family: inherit; font-size: 1rem;
        }
        textarea:focus { outline: none; border-color: #f6d365; }
        
        button {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #121212;
            border: none; padding: 12px 25px; border-radius: 6px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(246, 211, 101, 0.3); }
        button:active { transform: translateY(0); }
        
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #121212; }
        
        .output-panel {
            background-color: #ffffff; color: #000000; 
            padding: 20px; border-radius: 8px; min-height: 200px; line-height: 1.6;
            font-size: 1rem; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-y: auto; max-height: 500px; border: 2px solid #555;
        }
        .status-msg { font-size: 1em; font-weight: bold; }
    </style>
</head>
<body>

    <h1>👼 天使文本處理器</h1>

    <div class="container">
        <div class="settings-panel">
            <div class="settings-row">
                <label class="checkbox-group">
                    <input type="checkbox" id="chkS2T" checked>
                    1️⃣ 執行：簡體轉繁體 <span id="s2tStatus" style="font-size: 0.8em; color:#a8ff78;"></span>
                </label>
            </div>
            <div class="settings-row">
                <label class="checkbox-group">
                    <input type="checkbox" id="chkDict" checked>
                    2️⃣ 執行：自動套用雲端字庫 (紅字標示)
                </label>
            </div>
            <div class="settings-row">
                <span>📚 雲端字庫連線狀態：</span>
                <span id="dictStatus" class="status-msg">初始化中...</span>
            </div>
        </div>

        <div>
            <textarea id="sourceText" placeholder="請在此貼上需要被天使淨化的原始文字..."></textarea>
        </div>

        <div style="text-align: center;">
            <button onclick="processText()">✨ 開始淨化文字</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h3 style="margin: 0; color: #f6d365;">📝 處理結果預覽：</h3>
            <button class="btn-success" onclick="copyRichText()">📋 複製格式結果 (貼至原文件)</button>
        </div>
        <div id="outputHtml" class="output-panel">處理後的結果將保留換行與顏色，並顯示於此...</div>
    </div>

    <script>
        // 你的專屬固定字庫網址
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfuEzU_l8vOO-cbC_mQHBPEc9vpeOSqw4S5mv2D5xAJ2heBohMgr7aOzchLy8e6A/pub?gid=900428424&single=true&output=csv";

        let converterS2T = null;
        let replaceDict = {};
        let searchRegex = null;

        // 確保網頁完全載入後再執行，避免卡死
        window.onload = async function() {
            const statusLabel = document.getElementById('dictStatus');
            const s2tStatus = document.getElementById('s2tStatus');
            statusLabel.innerText = "⏳ 正在啟動天使系統...";

            // 1. 安全初始化簡繁轉換庫
            try {
                if (typeof OpenCC !== 'undefined') {
                    converterS2T = OpenCC.Converter({ from: 'cn', to: 'tw' });
                    s2tStatus.innerText = "(✅ 轉換引擎就緒)";
                } else {
                    s2tStatus.innerText = "(⚠️ 引擎載入失敗，可能是被擋廣告套件攔截)";
                    s2tStatus.style.color = "#ff4444";
                }
            } catch (e) {
                console.error("OpenCC 錯誤:", e);
                s2tStatus.innerText = "(⚠️ 引擎發生錯誤)";
            }

            // 2. 載入字庫
            await loadDictionary(statusLabel);
        };

        function parseCSVRow(str) {
            let result = [], cell = '', inQuotes = false;
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char === '"' && str[i+1] === '"') { cell += '"'; i++; } 
                else if (char === '"') { inQuotes = !inQuotes; } 
                else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; } 
                else { cell += char; }
            }
            result.push(cell);
            return result.map(c => c.trim());
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        async function loadDictionary(statusLabel) {
            statusLabel.innerText = "⏳ 正在與 Google 試算表連線中...";
            statusLabel.style.color = "#f6d365";

            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("網路連線異常：" + response.status);
                
                const csvData = await response.text();
                const lines = csvData.split(/\r?\n/).filter(line => line.trim() !== "");
                replaceDict = {};

                for (let i = 1; i < lines.length; i++) {
                    const row = parseCSVRow(lines[i]);
                    // 確保 A 欄和 B 欄都有資料才加入，防止空白行作亂
                    if (row.length >= 2 && row[0].trim() !== "" && row[1].trim() !== "") {
                        replaceDict[row[0].trim()] = row[1].trim();
                    }
                }

                const wordsCount = Object.keys(replaceDict).length;
                if (wordsCount === 0) {
                    throw new Error("試算表內沒有找到有效的字庫資料！");
                }

                const sortedWords = Object.keys(replaceDict).sort((a, b) => b.length - a.length);
                searchRegex = new RegExp(sortedWords.map(escapeRegExp).join('|'), 'g');

                statusLabel.innerText = `✅ 同步成功！天使已讀取 ${wordsCount} 筆取代規則。`;
                statusLabel.style.color = "#a8ff78";

            } catch (error) {
                console.error(error);
                statusLabel.innerText = `❌ 同步失敗 (${error.message})`;
                statusLabel.style.color = "#ff4444";
            }
        }

        function processText() {
            let text = document.getElementById('sourceText').value;
            const useS2T = document.getElementById('chkS2T').checked;
            const useDict = document.getElementById('chkDict').checked;
            const outputDiv = document.getElementById('outputHtml');

            if (!text.trim()) {
                outputDiv.innerHTML = "<span style='color:red;'>請先貼上原始文字喔！</span>";
                return;
            }

            // Step 1: 簡體轉繁體
            if (useS2T) {
                if (converterS2T) {
                    text = converterS2T(text);
                } else {
                    alert("⚠️ 簡繁轉換引擎未啟動，將跳過此步驟。");
                }
            }

            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Step 2: 字庫取代
            if (useDict) {
                if (searchRegex) {
                    text = text.replace(searchRegex, (matchedStr) => {
                        return `<span style="color: #ff0000; font-weight: bold;">${replaceDict[matchedStr]}</span>`;
                    });
                } else {
                    alert("⚠️ 天使字庫尚未載入成功，將跳過字庫取代。");
                }
            }

            text = text.replace(/\n/g, "<br>");
            outputDiv.innerHTML = text;
        }

        function copyRichText() {
            const outputDiv = document.getElementById('outputHtml');
            if (outputDiv.innerText.includes("處理後的結果將保留換行")) {
                alert("請先點擊「開始淨化文字」喔！");
                return;
            }

            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(outputDiv);
            
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                document.execCommand('copy');
                alert("✅ 複製成功！帶有紅字格式的文字已經存入剪貼簿，可以去 Word 貼上囉！");
            } catch (err) {
                alert("❌ 複製失敗，請手動反白框內的文字複製。");
            }
            selection.removeAllRanges();
        }
    </script>
</body>
</html>
