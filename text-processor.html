<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天使文本處理器 V4.0 - 品質控管與防護版</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #f6d365; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); letter-spacing: 1px; }
        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }
        
        .settings-panel, .excel-panel { background-color: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .excel-panel { border-color: #4facfe; position: relative; overflow: hidden; }

        .settings-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 1.1em; cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        
        input[type="text"] { flex: 1; min-width: 250px; padding: 10px; border-radius: 6px; border: 1px solid #555; background-color: #2a2a2a; color: #fff; font-family: inherit; font-size: 0.9rem; }
        textarea { width: 100%; min-height: 150px; resize: vertical; box-sizing: border-box; line-height: 1.6; padding: 15px; border-radius: 6px; border: 1px solid #555; background-color: #2a2a2a; color: #fff; font-family: inherit; font-size: 1rem; tab-size: 4; }
        textarea:focus { outline: none; border-color: #f6d365; }
        
        button { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #121212; border: none; padding: 12px 25px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(246, 211, 101, 0.3); }
        button:active { transform: translateY(0); }
        
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #121212; }
        .btn-excel { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #121212; }
        .btn-load { background: #444; color: #fff; padding: 10px 15px; font-size: 0.9rem; }
        .btn-edit { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: #fff; padding: 10px 15px; font-size: 0.9rem; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; display: inline-block; text-align: center; }
        .btn-edit:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(155, 89, 182, 0.3); }
        
        /* 📊 QC 面板樣式 */
        .qc-panel { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); border: 1px solid #4facfe; padding: 15px 20px; border-radius: 8px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .qc-highlight { color: #f6d365; font-weight: bold; font-size: 1.2em; margin: 0 5px; }

        .output-panel { background-color: #ffffff; color: #000000; padding: 20px; border-radius: 8px; min-height: 150px; font-size: 1rem; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-y: auto; max-height: 400px; border: 2px solid #555; }
        #outputHtml table { width: 100%; border-collapse: collapse; }
        #outputHtml td { padding: 4px 10px; border: 1px dashed #ddd; vertical-align: top; white-space: pre-wrap; word-break: break-all; }
        
        .status-msg { font-size: 1em; font-weight: bold; }
        #diagnosticReport { background-color: #2a0000; color: #ff8888; border: 1px dashed #ff4444; padding: 10px 15px; border-radius: 6px; font-size: 0.9em; display: none; line-height: 1.6; }
        #diagnosticReport ul { margin: 5px 0 0 0; padding-left: 20px; }
        input[type="file"]::file-selector-button { padding: 8px 16px; border-radius: 4px; border: none; background-color: #444; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>👼 天使文本處理器 V4.0 (品管防護版)</h1>

    <div class="container">
        <div class="settings-panel">
            <h3 style="margin: 0; color: #aaa;">⚙️ 處理規則設定</h3>
            <div class="settings-row">
                <label class="checkbox-group"><input type="checkbox" id="chkS2T" checked> 1️⃣ 執行：簡體轉繁體 <span id="s2tStatus" style="font-size: 0.8em; color:#a8ff78;"></span></label>
            </div>
            <div class="settings-row">
                <label class="checkbox-group"><input type="checkbox" id="chkDict" checked> 2️⃣ 執行：自動套用雲端字庫 (替換字將標示紅字)</label>
            </div>
            
            <div class="settings-row" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;">
                <span>🔗 CSV 網址：</span>
                <input type="text" id="csvUrlInput" placeholder="請貼上「發佈到網路」的 CSV 網址...">
                <button class="btn-load" onclick="loadDictionary()">🔄 重新連線</button>
                <a href="https://docs.google.com/spreadsheets/d/1dvT2ixcPhVBCn544zP2k5TLsy3T4yFFU/edit" target="_blank" class="btn-edit">📝 前往編輯字庫</a>
            </div>
            
            <div class="settings-row">
                <span>📚 雲端字庫狀態：</span>
                <span id="dictStatus" class="status-msg">等待連線...</span>
            </div>
            
            <div id="diagnosticReport"></div>
        </div>

        <div class="excel-panel">
            <h3 style="margin: 0; color: #4facfe;">📊 無損 Excel (xlsx) 批次處理</h3>
            <div class="settings-row" style="margin-top: 10px;">
                <input type="file" id="excelFile" accept=".xlsx">
                <button class="btn-excel" onclick="processExcel()">🚀 轉換並下載 Excel</button>
            </div>
            <span id="excelStatus" style="color: #a8ff78; font-weight: bold;"></span>
        </div>

        <hr style="width: 100%; border-color: #333;">

        <h3 style="margin: 0; color: #f6d365;">📝 純文字快速處理</h3>
        <div><textarea id="sourceText" placeholder="請貼上文字 (內含的 <color> 或 {0} 等代碼將受到智能防護)..."></textarea></div>
        <div style="text-align: center;"><button onclick="processText()">✨ 開始淨化文字</button></div>
        
        <div id="qcReportPanel" class="qc-panel">
            <h4 style="margin: 0 0 10px 0; color: #a8ff78;">📊 淨化品質管理報告 (QC)</h4>
            <div id="qcReportContent" style="font-size: 0.95em; line-height: 1.6;"></div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h3 style="margin: 0; color: #f6d365;">預覽區：</h3>
            <button class="btn-success" onclick="copyRichText()">📋 複製格式結果 (完美貼回 Excel)</button>
        </div>
        <div id="outputHtml" class="output-panel">處理後的結果將顯示於此...</div>
    </div>

    <script>
        let converterS2T = null;
        let replaceDict = {};
        let searchRegex = null;
        
        // 📊 QC 統計變數
        let qcStats = { charCount: 0, replaceCount: 0, wordFreq: {} };

        window.onload = async function() {
            const s2tStatus = document.getElementById('s2tStatus');
            const urlInput = document.getElementById('csvUrlInput');
            urlInput.value = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfuEzU_l8vOO-cbC_mQHBPEc9vpeOSqw4S5mv2D5xAJ2heBohMgr7aOzchLy8e6A/pub?gid=900428424&single=true&output=csv";

            try {
                if (typeof OpenCC !== 'undefined') {
                    converterS2T = OpenCC.Converter({ from: 'cn', to: 'tw' });
                    s2tStatus.innerText = "(✅ 就緒)";
                }
            } catch (e) { console.error(e); }

            await loadDictionary();
        };

        function resetQC() {
            qcStats = { charCount: 0, replaceCount: 0, wordFreq: {} };
            document.getElementById('qcReportPanel').style.display = 'none';
        }

        function recordReplace(word) {
            qcStats.replaceCount++;
            qcStats.wordFreq[word] = (qcStats.wordFreq[word] || 0) + 1;
        }

        function displayQC() {
            const sortedWords = Object.entries(qcStats.wordFreq).sort((a, b) => b[1] - a[1]);
            let topWordsHtml = sortedWords.slice(0, 5).map(item => `「${item[0]}」(${item[1]}次)`).join('、');
            if (topWordsHtml === '') topWordsHtml = '無觸發字庫';

            document.getElementById('qcReportContent').innerHTML = `
                🔹 本次共掃描：<span class="qc-highlight">${qcStats.charCount}</span> 字<br>
                🔹 成功替換了：<span class="qc-highlight">${qcStats.replaceCount}</span> 個詞彙<br>
                🔹 發生頻率最高的替換詞 (Top 5)：<span style="color:#fff;">${topWordsHtml}</span>
            `;
            document.getElementById('qcReportPanel').style.display = 'block';
        }

        function parseCSVRow(str) {
            let result = [], cell = '', inQuotes = false;
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char === '"' && str[i+1] === '"') { cell += '"'; i++; } 
                else if (char === '"') { inQuotes = !inQuotes; } 
                else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; } 
                else { cell += char; }
            }
            result.push(cell);
            return result.map(c => c.trim());
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        async function loadDictionary() {
            const statusLabel = document.getElementById('dictStatus');
            const reportDiv = document.getElementById('diagnosticReport');
            const url = document.getElementById('csvUrlInput').value.trim();
            
            reportDiv.style.display = "none";
            reportDiv.innerHTML = "";
            if (!url) return;
            statusLabel.innerText = "⏳ 連線中...";
            statusLabel.style.color = "#f6d365";

            try {
                const response = await fetch(url);
                const csvData = await response.text();
                const lines = csvData.split(/\r?\n/).filter(line => line.trim() !== "");
                replaceDict = {};
                let originalCount = 0; 
                let seenKeys = new Set();
                let duplicateWarnings = [];
                let invalidWarnings = [];

                for (let i = 1; i < lines.length; i++) {
                    const row = parseCSVRow(lines[i]);
                    const actualRowNum = i + 1; 

                    if (row.length < 2 || row[0].trim() === "" || row[1].trim() === "") {
                        invalidWarnings.push(`第 ${actualRowNum} 行：缺少 A 欄或 B 欄資料`);
                        continue;
                    }

                    let originalKey = row[0].trim();
                    let replaceValue = row[1].trim();
                    
                    if (seenKeys.has(originalKey)) {
                        duplicateWarnings.push(`第 ${actualRowNum} 行：搜尋字「${originalKey}」與前面的資料重複了`);
                    } else {
                        seenKeys.add(originalKey);
                        originalCount++;
                    }

                    replaceDict[originalKey] = replaceValue;
                    
                    if (converterS2T) {
                        let tradKey = converterS2T(originalKey);
                        if (tradKey !== originalKey) replaceDict[tradKey] = replaceValue;
                    }
                }

                const sortedWords = Object.keys(replaceDict).sort((a, b) => b.length - a.length);
                if (sortedWords.length > 0) searchRegex = new RegExp(sortedWords.map(escapeRegExp).join('|'), 'g');

                statusLabel.innerText = `✅ 同步成功！(有效資料共 ${originalCount} 筆)`;
                statusLabel.style.color = "#a8ff78";

                if (duplicateWarnings.length > 0 || invalidWarnings.length > 0) {
                    reportDiv.style.display = "block";
                    let reportHtml = `<strong>🕵️ 系統診斷報告：</strong><br>扣掉以下問題後，正好是 ${originalCount} 筆！<ul>`;
                    duplicateWarnings.forEach(msg => reportHtml += `<li>⚠️ ${msg}</li>`);
                    invalidWarnings.forEach(msg => reportHtml += `<li>❌ ${msg}</li>`);
                    reportHtml += "</ul>";
                    reportDiv.innerHTML = reportHtml;
                }
            } catch (error) {
                statusLabel.innerText = "❌ 載入失敗"; statusLabel.style.color = "#ff4444";
            }
        }

        function processText() {
            resetQC();
            let originalInput = document.getElementById('sourceText').value;
            const useS2T = document.getElementById('chkS2T').checked;
            const useDict = document.getElementById('chkDict').checked;
            const outputDiv = document.getElementById('outputHtml');

            if (!originalInput.trim()) { outputDiv.innerHTML = "<span style='color:red;'>請先貼上文字！</span>"; return; }
            
            qcStats.charCount = originalInput.length;

            // 🛡️ 步驟一：變數防護罩 (抓出 < > 和 { } 內的代碼)
            let protectedTags = [];
            let text = originalInput.replace(/<[^>]+>|\{[^}]+\}/g, (match) => {
                protectedTags.push(match);
                return `⟪TAG${protectedTags.length - 1}⟫`;
            });

            // 步驟二：簡轉繁
            if (useS2T && converterS2T) text = converterS2T(text);

            // 步驟三：紅字字典取代
            if (useDict && searchRegex) {
                text = text.replace(searchRegex, (matchedStr) => {
                    const replacedWord = replaceDict[matchedStr];
                    recordReplace(replacedWord); // 📊 紀錄 QC 數據
                    return `<span style="color: #ff0000; font-weight: bold;">${replacedWord}</span>`;
                });
            }
            
            // 🛡️ 步驟四：解開防護罩，並進行 HTML 安全跳脫 (確保 <color> 在網頁上不會變成亂碼)
            text = text.replace(/⟪TAG(\d+)⟫/g, (match, p1) => {
                let originalTag = protectedTags[parseInt(p1)];
                return originalTag.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            });
            
            // 步驟五：隱形表格轉換
            let htmlTable = '<table style="border-collapse: collapse; border: none; width: 100%;">';
            let rows = text.split('\n');
            for (let row of rows) {
                htmlTable += '<tr>';
                let cells = row.split('\t');
                for (let cell of cells) {
                    let cellContent = cell === "" ? "<br>" : cell;
                    htmlTable += `<td style="border: none; white-space: pre-wrap; mso-number-format: '\\@';">${cellContent}</td>`;
                }
                htmlTable += '</tr>';
            }
            htmlTable += '</table>';
            
            outputDiv.innerHTML = htmlTable;
            displayQC();
        }

        function copyRichText() {
            const outputDiv = document.getElementById('outputHtml');
            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(outputDiv);
            selection.removeAllRanges();
            selection.addRange(range);
            try { 
                document.execCommand('copy'); 
                alert("✅ 複製成功！隱形表格已存入剪貼簿，現在貼到 Excel 每個字都會乖乖待在自己的欄位裡囉！"); 
            } catch (err) { alert("❌ 複製失敗"); }
            selection.removeAllRanges();
        }

        async function processExcel() {
            const fileInput = document.getElementById('excelFile');
            const statusBox = document.getElementById('excelStatus');
            const useS2T = document.getElementById('chkS2T').checked;
            const useDict = document.getElementById('chkDict').checked;

            if (fileInput.files.length === 0) return;
            statusBox.innerText = "⏳ 正在啟動天使引擎讀取檔案..."; statusBox.style.color = "#f6d365";
            resetQC();

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(arrayBuffer);

                workbook.eachSheet((worksheet) => {
                    worksheet.eachRow((row) => {
                        row.eachCell((cell) => {
                            if (cell.type === ExcelJS.ValueType.String) {
                                let originalText = cell.value;
                                qcStats.charCount += originalText.length;
                                let processed = false;
                                
                                // 🛡️ 變數防護罩
                                let protectedTags = [];
                                let text = originalText.replace(/<[^>]+>|\{[^}]+\}/g, (match) => {
                                    protectedTags.push(match);
                                    return `⟪TAG${protectedTags.length - 1}⟫`;
                                });

                                if (useS2T && converterS2T) text = converterS2T(text);

                                if (useDict && searchRegex) {
                                    let fragments = [];
                                    let lastIndex = 0;
                                    let localRegex = new RegExp(searchRegex.source, 'g');
                                    let match;
                                    while ((match = localRegex.exec(text)) !== null) {
                                        processed = true;
                                        if (match.index > lastIndex) fragments.push({ text: text.substring(lastIndex, match.index) });
                                        
                                        const replacedWord = replaceDict[match[0]];
                                        recordReplace(replacedWord); // 📊 紀錄 QC 數據
                                        
                                        fragments.push({ text: replacedWord, font: { color: { argb: 'FFFF0000' }, bold: true } });
                                        lastIndex = localRegex.lastIndex;
                                    }
                                    if (lastIndex < text.length) fragments.push({ text: text.substring(lastIndex) });
                                    
                                    // 🛡️ 解開防護罩 (寫回 Fragments)
                                    fragments.forEach(frag => {
                                        if (frag.text.includes('⟪TAG')) {
                                            frag.text = frag.text.replace(/⟪TAG(\d+)⟫/g, (match, p1) => protectedTags[parseInt(p1)]);
                                        }
                                    });

                                    if (processed) cell.value = { richText: fragments };
                                    else {
                                        let restoredText = text.replace(/⟪TAG(\d+)⟫/g, (match, p1) => protectedTags[parseInt(p1)]);
                                        cell.value = restoredText;
                                    }
                                } else { 
                                    let restoredText = text.replace(/⟪TAG(\d+)⟫/g, (match, p1) => protectedTags[parseInt(p1)]);
                                    cell.value = restoredText; 
                                }
                            }
                        });
                    });
                });

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl; a.download = "天使淨化版_" + file.name;
                document.body.appendChild(a); a.click(); a.remove(); window.URL.revokeObjectURL(downloadUrl);
                statusBox.innerText = "✅ 轉換成功！請查看下載資料夾。"; statusBox.style.color = "#a8ff78";
                
                displayQC(); // 📊 顯示 QC 報告
            } catch (error) {
                statusBox.innerText = "❌ 處理發生錯誤"; statusBox.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
